services:
  backend:
    build:
      context: apps/backend
    ports:
      - "3000:3000"
    # Uncomment to persist the SQLite database across container restarts:
    # volumes:
    #   - backend-data:/app

  frontend:
    build:
      context: apps/frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

