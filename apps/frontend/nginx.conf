server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Angular client-side routing — serve index.html for any unknown path
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Gzip static assets
  gzip on;
  gzip_types text/plain text/css application/javascript application/json;
}
